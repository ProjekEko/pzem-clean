<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monitoring Kos - FCM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
        }
        .warning {
            background: #fff3cd;
            color: #856404;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
        }
        pre {
            background: #f4f4f4;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
        }
        .token-box {
            word-break: break-all;
            font-size: 12px;
            background: #eee;
            padding: 10px;
            border-radius: 4px;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-warning {
            background: #ffc107;
            color: black;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .data-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .alert-text {
            font-weight: bold;
            font-size: 18px;
        }
        .normal {
            color: green;
        }
        .anomaly {
            color: red;
        }
        .notif-popup {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 10px 15px;
            margin: 10px 0;
            border-radius: 4px;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <h1>🔔 Monitoring Kos - FCM</h1>

    <div id="statusBox" class="status info">🔄 Initializing...</div>
    <div>
        <p><strong>📱 FCM Token:</strong></p>
        <div id="tokenBox" class="token-box">Belum ada</div>
    </div>

    <div style="margin: 20px 0;">
        <button class="btn-success" onclick="kirimNotifikasiTest()">🔔 Kirim Notifikasi Test</button>
        <button class="btn-danger" onclick="kirimDataDummy()">📤 Kirim Data Dummy</button>
        <button class="btn-warning" onclick="mulaiOtomatis()">🔄 Otomatis (5 detik)</button>
        <button class="btn-secondary" onclick="hentikan()">⏹ Stop</button>
    </div>

    <hr />

    <h2>📊 Data Realtime</h2>
    <div class="data-box">
        <h3>🏠 Kamar 1</h3>
        <p>⚡ Daya: <span id="daya1">0</span> W</p>
        <p>🔌 Arus: <span id="arus1">0</span> A</p>
        <p>⛰️ Tegangan: <span id="tegangan1">0</span> V</p>
        <p>📢 Status: <span id="alert1" class="alert-text normal">Normal</span></p>
    </div>

    <div class="data-box">
        <h3>🏠 Kamar 2</h3>
        <p>⚡ Daya: <span id="daya2">0</span> W</p>
        <p>🔌 Arus: <span id="arus2">0</span> A</p>
        <p>⛰️ Tegangan: <span id="tegangan2">0</span> V</p>
        <p>📢 Status: <span id="alert2" class="alert-text normal">Normal</span></p>
    </div>

    <hr />
    <h3>📋 Log</h3>
    <pre id="log">🔥 Siap!</pre>

    <div id="notifContainer"></div>

    <!-- ============ FIREBASE SDK ============ -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js",
                "firebase/messaging": "https://www.gstatic.com/firebasejs/10.13.0/firebase-messaging.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, get, onValue } from "firebase/database";
        import { getMessaging, getToken, onMessage } from "firebase/messaging";

        // ============ CONFIG FIREBASE ============
        const firebaseConfig = {
            apiKey: "AIzaSyDPp_SyvQJApKckpT-YpGBbfMMBAkpvj7A",
            authDomain: "pzemm-6b93a.firebaseapp.com",
            databaseURL: "https://pzemm-6b93a-default-rtdb.firebaseio.com/",
            projectId: "pzemm-6b93a",
            storageBucket: "pzemm-6b93a.firebasestorage.app",
            messagingSenderId: "160759139666",
            appId: "1:160759139666:web:68172f5527557b36507e8b"
        };

        const VAPID_KEY = "BOJzlfEzwgido0_CRhFroVR6Ux3XPLasuj9bc0OQanfuplBgv1YUeHu63UG01oIsAuKcnHh11xA2dUmNQm_zq2A";

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messaging = getMessaging(app);

        // ============ DOM ELEMENTS ============
        const logEl = document.getElementById('log');
        const statusBox = document.getElementById('statusBox');
        const tokenBox = document.getElementById('tokenBox');
        const notifContainer = document.getElementById('notifContainer');

        const daya1 = document.getElementById('daya1');
        const arus1 = document.getElementById('arus1');
        const tegangan1 = document.getElementById('tegangan1');
        const alert1 = document.getElementById('alert1');
        const daya2 = document.getElementById('daya2');
        const arus2 = document.getElementById('arus2');
        const tegangan2 = document.getElementById('tegangan2');
        const alert2 = document.getElementById('alert2');

        let lastAlert1 = 'Normal';
        let lastAlert2 = 'Normal';

        function log(msg) {
            logEl.innerText += '\n' + msg;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function setStatus(msg, type = 'info') {
            statusBox.innerText = msg;
            statusBox.className = 'status ' + type;
        }

        // ============ TAMPILKAN NOTIFIKASI DI WEB ============
        function showNotifInWeb(title, body) {
            const div = document.createElement('div');
            div.className = 'notif-popup';
            div.innerHTML = `<strong>🔔 ${title}</strong><br>${body}`;
            notifContainer.prepend(div);
            setTimeout(() => div.remove(), 15000);
        }

        // ============ KIRIM NOTIFIKASI OTOMATIS ============
        async function kirimNotifikasiOtomatis(kamar, pesan) {
            try {
                const snapshot = await get(ref(db, '/fcm_tokens'));
                const tokensData = snapshot.val();
                if (!tokensData) {
                    log('⚠️ Belum ada token, notifikasi tidak terkirim');
                    return;
                }

                const tokenList = Object.values(tokensData).map(t => t.token);
                let success = 0;

                for (const token of tokenList) {
                    try {
                        const response = await fetch('/api/send', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                token: token,
                                title: `🚨 PERINGATAN ${kamar}!`,
                                body: pesan
                            })
                        });
                        const result = await response.json();
                        if (result.success) success++;
                    } catch (e) {
                        log(`❌ Gagal kirim ke token: ${e.message}`);
                    }
                }

                log(`📤 Notifikasi otomatis terkirim ke ${success} perangkat`);
                showNotifInWeb(`🚨 ${kamar}`, pesan);
            } catch (e) {
                log(`❌ Error kirim notifikasi otomatis: ${e.message}`);
            }
        }

        // ============ LISTENER DATA REAL-TIME ============
        // Kamar 1
        onValue(ref(db, '/kamar_1'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                daya1.innerText = data.daya?.toFixed(2) || 0;
                arus1.innerText = data.arus?.toFixed(2) || 0;
                tegangan1.innerText = data.tegangan?.toFixed(1) || 0;
            }
        });

        onValue(ref(db, '/alerts/kamar_1'), async (snapshot) => {
            const val = snapshot.val() || 'Normal';
            alert1.innerText = val;
            alert1.className = 'alert-text ' + (val.includes('berlebih') ? 'anomaly' : 'normal');

            // Kirim notifikasi otomatis jika status berubah jadi anomali
            if (val.includes('berlebih') && lastAlert1 === 'Normal') {
                await kirimNotifikasiOtomatis('Kamar 1', val);
            }
            lastAlert1 = val;
        });

        // Kamar 2
        onValue(ref(db, '/kamar_2'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                daya2.innerText = data.daya?.toFixed(2) || 0;
                arus2.innerText = data.arus?.toFixed(2) || 0;
                tegangan2.innerText = data.tegangan?.toFixed(1) || 0;
            }
        });

        onValue(ref(db, '/alerts/kamar_2'), async (snapshot) => {
            const val = snapshot.val() || 'Normal';
            alert2.innerText = val;
            alert2.className = 'alert-text ' + (val.includes('berlebih') ? 'anomaly' : 'normal');

            if (val.includes('berlebih') && lastAlert2 === 'Normal') {
                await kirimNotifikasiOtomatis('Kamar 2', val);
            }
            lastAlert2 = val;
        });

        // ============ AUTO REQUEST PERMISSION ============
        async function autoRequestPermission() {
            try {
                const permission = await Notification.requestPermission();
                log(`📢 Izin: ${permission}`);

                if (permission !== 'granted') {
                    setStatus('⚠️ Izin notifikasi ditolak. Aktifkan di pengaturan browser.', 'error');
                    return;
                }

                const registration = await navigator.serviceWorker.ready;
                const token = await getToken(messaging, {
                    vapidKey: VAPID_KEY,
                    serviceWorkerRegistration: registration
                });

                if (token) {
                    tokenBox.innerText = token;
                    setStatus('✅ Token berhasil!', 'success');
                    log(`📱 Token: ${token.substring(0, 30)}...`);

                    const tokenPath = '/fcm_tokens/' + token.replace(/[.#$\/\[\]]/g, '_');
                    await set(ref(db, tokenPath), { token, timestamp: Date.now() });
                    log('✅ Token tersimpan');
                }
            } catch (error) {
                setStatus(`❌ Error: ${error.message}`, 'error');
                log(`❌ Error: ${error.message}`);
            }
        }

        // ============ AUTO RUN SAAT LOAD ============
        window.addEventListener('load', async () => {
            log('🔥 Memulai...');
            log('⏳ Mengecek Service Worker...');

            try {
                // Register SW
                await navigator.serviceWorker.register('/firebase-messaging-sw.js');
                log('✅ Service Worker registered');

                // Tunggu SW ready
                const registration = await navigator.serviceWorker.ready;
                log('✅ Service Worker ready');

                // Cek apakah sudah punya token
                try {
                    const token = await getToken(messaging, {
                        vapidKey: VAPID_KEY,
                        serviceWorkerRegistration: registration
                    });

                    if (token) {
                        tokenBox.innerText = token;
                        setStatus('✅ Token sudah ada!', 'success');
                        log('📱 Token ditemukan');

                        // Simpan token jika belum ada di database
                        const tokenPath = '/fcm_tokens/' + token.replace(/[.#$\/\[\]]/g, '_');
                        await set(ref(db, tokenPath), { token, timestamp: Date.now() });
                    } else {
                        // Belum ada token → minta izin
                        log('⏳ Belum ada token, meminta izin...');
                        await autoRequestPermission();
                    }
                } catch (e) {
                    log(`⏳ Belum ada token atau error, meminta izin...`);
                    await autoRequestPermission();
                }

            } catch (error) {
                log(`❌ Error inisialisasi: ${error.message}`);
                setStatus(`❌ Error: ${error.message}`, 'error');
                // Coba lagi setelah 3 detik
                setTimeout(autoRequestPermission, 3000);
            }
        });

        // ============ TANGKAP NOTIFIKASI FOREGROUND ============
        onMessage(messaging, (payload) => {
            const title = payload.notification?.title || 'Notifikasi';
            const body = payload.notification?.body || '';
            log(`🔔 Notifikasi diterima: ${title}`);
            showNotifInWeb(title, body);
        });

        // ============ KIRIM NOTIFIKASI TEST MANUAL ============
        window.kirimNotifikasiTest = async function() {
            try {
                const snapshot = await get(ref(db, '/fcm_tokens'));
                const tokensData = snapshot.val();
                if (!tokensData) {
                    setStatus('❌ Belum ada token!', 'error');
                    log('❌ Tidak ada FCM token tersimpan');
                    return;
                }

                const tokenList = Object.values(tokensData).map(t => t.token);
                log(`📤 Ditemukan ${tokenList.length} token`);
                let success = 0;

                for (const token of tokenList) {
                    try {
                        const response = await fetch('/api/send', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                token: token,
                                title: '🔔 Test Notifikasi',
                                body: 'Ini notifikasi dari web dashboard!'
                            })
                        });
                        const result = await response.json();
                        if (result.success) success++;
                    } catch (e) {
                        log(`❌ Error: ${e.message}`);
                    }
                }
                setStatus(`✅ ${success} notifikasi terkirim!`, 'success');
                log(`📊 Selesai: ${success} sukses`);
            } catch (error) {
                setStatus(`❌ Error: ${error.message}`, 'error');
                log(`❌ Error: ${error.message}`);
            }
        };

        // ============ KIRIM DATA DUMMY ============
        const DB_URL = 'https://pzemm-6b93a-default-rtdb.firebaseio.com/';

        window.kirimDataDummy = async function() {
            try {
                const t1 = 220 + (Math.random() - 0.5) * 10;
                const a1 = 1 + Math.random() * 4;
                const p1 = t1 * a1;
                const t2 = 220 + (Math.random() - 0.5) * 10;
                const a2 = 1 + Math.random() * 4;
                const p2 = t2 * a2;

                const alert1Val = p1 > 500 ? `⚠️ Daya berlebih: ${p1.toFixed(2)}W` : 'Normal';
                const alert2Val = p2 > 500 ? `⚠️ Daya berlebih: ${p2.toFixed(2)}W` : 'Normal';

                await fetch(DB_URL + 'kamar_1.json', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tegangan: t1, arus: a1, daya: p1, energi: p1 * 0.001, timestamp: Date.now() })
                });
                await fetch(DB_URL + 'kamar_2.json', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tegangan: t2, arus: a2, daya: p2, energi: p2 * 0.001, timestamp: Date.now() })
                });
                await fetch(DB_URL + 'alerts/kamar_1.json', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(alert1Val)
                });
                await fetch(DB_URL + 'alerts/kamar_2.json', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(alert2Val)
                });

                log(`✅ Data: Kamar1=${p1.toFixed(2)}W | Kamar2=${p2.toFixed(2)}W`);
                setStatus(`✅ Data terkirim!`, 'success');
            } catch (e) {
                log(`❌ Error: ${e.message}`);
            }
        };

        // ============ OTOMATIS ============
        let interval;
        window.mulaiOtomatis = function() {
            if (interval) clearInterval(interval);
            window.kirimDataDummy();
            interval = setInterval(window.kirimDataDummy, 5000);
            log('🔄 Otomatis berjalan (tiap 5 detik)');
        };
        window.hentikan = function() {
            if (interval) {
                clearInterval(interval);
                interval = null;
                log('⏹ Dihentikan');
            }
        };

        log('🔥 Siap!');
        log('📌 Izin notifikasi akan diminta otomatis');
    </script>
</body>

</html>
